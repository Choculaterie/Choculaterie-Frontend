<div class="viewer-dialog">
    <div class="viewer-header">
        <h2>{{ data.fileName }}</h2>
        <button mat-icon-button mat-dialog-close>
            <mat-icon>close</mat-icon>
        </button>
    </div>

    <div class="viewer-body">
        @if (loading()) {
        <div class="loading-overlay">
            <mat-progress-bar [mode]="loadingProgress() > 0 ? 'determinate' : 'indeterminate'"
                [value]="loadingProgress()" />
            <p>{{ loadingStatus() }}</p>
        </div>
        }

        @if (error()) {
        <div class="error-overlay">
            <mat-icon>error_outline</mat-icon>
            <p>{{ error() }}</p>
        </div>
        }

        <canvas #viewerCanvas class="render-canvas" [class.hidden]="loading() || error()"></canvas>
    </div>

    @if (!loading() && !error() && maxY > 1) {
    <div class="viewer-controls">
        <div class="slider-group">
            <label>Min Y: {{ currentMinY }}</label>
            <mat-slider [min]="minY" [max]="maxY" [step]="1" discrete>
                <input matSliderThumb [(ngModel)]="currentMinY" (valueChange)="onYRangeChange()" />
            </mat-slider>
        </div>
        <div class="slider-group">
            <label>Max Y: {{ currentMaxY }}</label>
            <mat-slider [min]="minY" [max]="maxY" [step]="1" discrete>
                <input matSliderThumb [(ngModel)]="currentMaxY" (valueChange)="onYRangeChange()" />
            </mat-slider>
        </div>
    </div>
    }

    <div class="viewer-hint">
        @if (blockCountInfo()) {
        <span class="block-count-info">{{ blockCountInfo() }}</span>
        <span class="hint-sep">·</span>
        }
        Drag to rotate · Middle-click drag to pan · Scroll to zoom · WASD to move
    </div>
</div>
